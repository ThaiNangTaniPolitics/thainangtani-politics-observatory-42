layout: null

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Observatory</title>
    
    <style>
        /* Grundlegende Struktur: Wissenschaftlich & Kühl */
        body {
            font-family: "Georgia", "Times New Roman", serif;
            font-size: 19px;
            line-height: 1.6;
            color: #1a1a1a;
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 30px;
            background-color: #fdfdfd;
        }

        /* Überschriften mit dem "Thai-Gold" Akzent */
        h1, h2, h3 {
            color: #8a6d3b;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-top: 1.5em;
        }

        /* Links: Dezent aber erkennbar */
        a {
            color: #2a5d8f;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }

        /* Hauptinhalt */
        main {
            background: white;
            padding: 30px;
            border: 1px solid #e1e1e1;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
        }

        /* Bilder-Standard-Styling */
        img {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 2em auto;
            border-radius: 4px;
            cursor: zoom-in; /* Signalisiert das Zoom-Skript */
            transition: transform 0.2s;
        }
        
        img:hover {
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        /* Galerie-Unterstützung */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 2em 0;
        }
        .gallery img {
            margin: 0; /* Überschreibt den Standard-Abstand in der Galerie */
        }

        /* Footer Styling */
        footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 2px solid #8a6d3b;
            font-size: 0.85em;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <main>
        {{ content }}
    </main>

    {% include footer.html %}

</body>
</html>
