---
layout: null
---
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Observatory</title>
    
    <style>
        /* Radikaler Minimalismus: Nur Inhalt, kein Design-Ballast */
        body {
            font-family: "Georgia", "Times New Roman", serif;
            font-size: 20px; /* Leicht vergrößert für maximale Autorität */
            line-height: 1.6;
            color: #1a1a1a;
            background-color: #fdfdfd;
            
            /* Große Breite für die Bilder, aber Lesbarkeit durch Padding */
            max-width: 1200px; 
            margin: 0 auto;
            padding: 60px 5vw; /* Nutzt Viewport-Abstände für Flexibilität */
        }

        /* Überschriften: Schlichte Marker im Text */
        h1, h2, h3 {
            font-family: sans-serif;
            color: #8a6d3b;
            margin-top: 2em;
            font-weight: bold;
        }

        /* Bilder: Werden zum primären Informationsträger */
        img {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 3em auto;
            cursor: zoom-in;
        }

        /* Die Galerie bleibt als funktionales Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 3em;
        }
        
        .gallery .img-container {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #eee;
        }
        
        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            margin: 0;
        }

        /* Links: Minimaler Akzent */
        a {
            color: #2a5d8f;
            text-decoration: underline;
        }

        footer {
            margin-top: 100px;
            padding-bottom: 50px;
            font-size: 0.8em;
            color: #aaa;
            text-align: left;
        }
    </style>
</head>
<body>

    {{ content }}

    {% include footer.html %}

</body>
</html>
