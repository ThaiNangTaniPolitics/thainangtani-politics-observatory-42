{% raw %}
<script>
// --- STICKY NAVIGATION LOGIC ---
const nav = document.querySelector('nav') || document.querySelector('.navigation');
if (nav) {
  Object.assign(nav.style, {
    position: 'sticky',
    top: '0',
    zIndex: '9999',
    backgroundColor: window.getComputedStyle(document.body).backgroundColor || '#ffffff',
    borderBottom: '1px solid #eaeaea'
  });
}

// --- IMAGE ZOOM & GALLERY LOGIC ---
document.addEventListener("click", e => {
  // Findet das Bild, auch wenn es in einem Link verschachtelt ist
  const targetImg = e.target.closest("img");
  
  if (targetImg && !targetImg.closest("footer")) {
    e.preventDefault();
    e.stopPropagation();

    const images = [...document.querySelectorAll("img:not(footer img)")];
    let index = images.indexOf(targetImg);
    const zoomedImg = new Image();
    
    function showImage(i) {
      index = (i + images.length) % images.length;
      zoomedImg.style.opacity = "0";
      setTimeout(() => {
        zoomedImg.src = images[index].src;
        zoomedImg.style.opacity = "1";
      }, 100);
    }

    showImage(index);

    Object.assign(zoomedImg.style, {
      maxWidth: "95vw", maxHeight: "95vh", objectFit: "contain",
      borderRadius: "6px", boxShadow: "0 0 30px rgba(0,0,0,0.8)",
      transition: "opacity 0.2s ease", position: "relative", zIndex: "10002"
    });

    const overlay = Object.assign(document.createElement("div"), {
      style: `position: fixed; top: 0; left: 0; right: 0; bottom: 0;
              background: rgba(0,0,0,0.95); display: flex; align-items: center;
              justify-content: center; z-index: 10000; opacity: 0;
              transition: opacity 0.2s ease; touch-action: none;`
    });

    overlay.appendChild(zoomedImg);
    document.body.appendChild(overlay);
    requestAnimationFrame(() => overlay.style.opacity = "1");

    const closeOverlay = () => {
      overlay.style.opacity = "0";
      setTimeout(() => overlay.remove(), 200);
      document.removeEventListener("keydown", keyHandler);
    };

    zoomedImg.onclick = (ev) => {
      ev.stopPropagation();
      closeOverlay();
    };

    overlay.onclick = (ev) => {
      if (ev.target === overlay) closeOverlay();
    };
    
    const keyHandler = ev => {
      if (ev.key === "Escape") closeOverlay();
      if (ev.key === "ArrowLeft") showImage(index - 1);
      if (ev.key === "ArrowRight") showImage(index + 1);
    };
    document.addEventListener("keydown", keyHandler);

    const leftZone = document.createElement("div");
    const rightZone = document.createElement("div");

    [leftZone, rightZone].forEach((zone, i) => {
      Object.assign(zone.style, {
        position: "absolute", top: "0", bottom: "0", width: "25%",
        cursor: i === 0 ? "w-resize" : "e-resize", zIndex: "10005"
      });
      if (i === 0) zone.style.left = "0"; else zone.style.right = "0";
      
      zone.onclick = (ev) => {
        ev.stopPropagation();
        showImage(i === 0 ? index - 1 : index + 1);
      };
      overlay.appendChild(zone);
    });

    let startX = 0;
    overlay.addEventListener("touchstart", ev => {
      startX = ev.touches[0].clientX;
    }, {passive: true});

    overlay.addEventListener("touchend", ev => {
      const diff = ev.changedTouches[0].clientX - startX;
      if (Math.abs(diff) > 60) {
        showImage(diff > 0 ? index - 1 : index + 1);
      }
    }, {passive: true});
  }
});
</script>
{% endraw %}
